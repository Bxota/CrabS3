services:
  db:
    image: postgres:latest
    container_name: crabs3-db
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crabs3
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - crabs3-network

  clamav:
    image: clamav/clamav:stable
    container_name: crabs3-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
      - CLAMAV_NO_CLAMD=false
      - CLAMD_CONF_ScanArchive=true
      - CLAMD_CONF_ScanOLE2=true
      - CLAMD_CONF_ScanPDF=true
      - CLAMD_CONF_ScanXMLDOCS=true
      - CLAMD_CONF_MaxRecursion=10
      - CLAMD_CONF_MaxFileSize=104857600
      - CLAMD_CONF_MaxScanSize=419430400
      - CLAMD_CONF_AlertBrokenExecutables=true
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - crabs3-network
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  web:
    depends_on:
      - db
      - clamav
    build: .
    ports:
      - "5000:3000"
    container_name: crabs3
    restart: unless-stopped
    environment:
      - S3_HOT_ENDPOINT=http://192.168.1.100:9000
      - S3_HOT_ACCESS_KEY_ID=changeme
      - S3_HOT_SECRET_ACCESS_KEY=changeme
      - S3_HOT_BUCKET_NAME=crabs3

      - S3_COLD_ENDPOINT=http://192.168.1.101:9000
      - S3_COLD_ACCESS_KEY_ID=changeme
      - S3_COLD_SECRET_ACCESS_KEY=changeme
      - S3_COLD_BUCKET_NAME=crabs3-cold

      - S3_REGION=us-east-1

      - DATABASE_URL=postgresql://user:password@db:5432/crabs3
      - BASE_URL=http://localhost:5000

      - SMTP_HOST=your.smtp.host
      - SMTP_USER=your_smtp_user
      - SMTP_PASS=your_smtp_password
      - SMTP_FROM=CrabS3 Notifications <your_smtp_user>

      - LOG_MIN_LEVEL=INFO

      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    networks:
      - crabs3-network
      - mail-network # Connect to external mail network for sending emails
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  crabs3-network:
    driver: bridge
  mail-network:
    external: true

volumes:
  db-data:
    driver: local
  clamav_data:
